apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: full-cd-pipeline
spec:
  params:
    - name: repo-url
      type: string
    - name: branch-name
      type: string
      default: main

  workspaces:
    - name: shared-workspace

  tasks:

    # 1. CLONE
    - name: clone-repo
      taskRef:
        name: git-clone
      params:
        - name: url
          value: "$(params.repo-url)"
        - name: revision
          value: "$(params.branch-name)"
      workspaces:
        - name: output
          workspace: shared-workspace

    # 2. TEST
    - name: test-app
      runAfter: ["clone-repo"]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: install
            image: python:3.9-slim
            workingDir: /workspace/source
            script: |
              pip install flake8 nose

          - name: lint
            image: python:3.9-slim
            workingDir: /workspace/source
            script: |
              pip install flake8
              flake8 .

          - name: test
            image: python:3.9-slim
            workingDir: /workspace/source
            script: |
              pip install nose
              nosetests || true
      workspaces:
        - name: source
          workspace: shared-workspace

    # 3. DEPLOY
    - name: deploy
      runAfter: ["test-app"]
      taskSpec:
        steps:
          - name: deploy-to-openshift
            image: quay.io/openshift/origin-cli
            script: |
              oc new-app python:3.9-slim --name=myapp || true
              oc expose svc myapp || true